# Localnet dependencies for integration testing: standalone rippled + Firestore emulator.
# Usage: docker compose up -d

services:
  rippled:
    image: xrpllabsofficial/xrpld:3.1.3
    platform: linux/amd64
    command: ["-a", "--start"]
    ports:
      - "6006:6006"
    volumes:
      - ./docker/rippled.cfg:/config/rippled.cfg:ro
      - ./docker/validators.txt:/config/validators.txt:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6006"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  firestore:
    image: google/cloud-sdk:emulators
    # No arm64 build exists for this image; pin amd64 (runs under emulation) to silence the platform-mismatch warning.
    platform: linux/amd64
    command:
      - gcloud
      - emulators
      - firestore
      - start
      - --host-port=0.0.0.0:8080
      - --database-mode=firestore-native
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
